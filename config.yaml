rns:
  mode: rest              # 'native' (direct RNS lib) or 'rest' (reticulum-mcp API — use on node4)
  rest_url: http://192.168.1.204:8023
  peer_host: 192.168.1.204
  peer_port: 4242
  home_lat: 41.7001       # Fallback lat when peer has no GPS announce
  home_lon: -74.0
  node_identity: af60a4f4863c9bff05a9871359d67e1f  # Local rnsd transport identity

atak:
  multicast_addr: 239.2.3.1
  multicast_port: 6969
  tak_server: null        # Optional: "192.168.1.x:8087" for TAK Server TCP
  poll_interval_sec: 30
  stale_minutes: 5

callsign_prefix: "RNS-"
