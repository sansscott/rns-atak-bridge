rns:
  mode: native            # 'native' (direct RNS lib, recommended) or 'rest' (reticulum-mcp API)
  rest_url: http://127.0.0.1:8023
  peer_host: 127.0.0.1   # IP of your rnsd TCP server
  peer_port: 4242
  home_lat: 0.0           # Your location — used as fallback when peer has no GPS announce
  home_lon: 0.0

  # Your rnsd transport identity hash — enables self-track (your node appears in ATAK).
  # Find it by running: rnstatus
  # Copy the value after "Transport Identity:" and paste it here.
  # Leave blank to disable self-track.
  node_identity: ""

atak:
  multicast_addr: 239.2.3.1
  multicast_port: 6969
  tak_server: null        # Optional: "host:port" for TAK Server TCP (cross-subnet)
  poll_interval_sec: 30
  stale_minutes: 5

callsign_prefix: "RNS-"
